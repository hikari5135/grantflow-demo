<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>賃金台帳 自動生成ツール｜GrantFlow デモ版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;background:#f0f2f5;min-height:100vh;padding:1.5rem 1rem;display:flex;justify-content:center}
.app{max-width:760px;width:100%}
.demo-banner{background:linear-gradient(135deg,#533AB7,#7C5DE0);border-radius:12px;padding:10px 16px;margin-bottom:1rem;color:#fff;text-align:center;font-size:11px}
.topbar{background:linear-gradient(135deg,#0C447C,#185FA5);border-radius:12px;padding:14px 16px;margin-bottom:1rem;color:#fff;text-align:center}
.topbar h1{font-size:15px;font-weight:700;margin-bottom:4px}
.topbar p{font-size:11px;opacity:.85;line-height:1.6}
.tabs{display:flex;gap:4px;margin-bottom:1rem;background:#fff;border-radius:10px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tab{flex:1;padding:8px 4px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;border-radius:7px;color:#666;border:none;background:none;font-family:inherit}
.tab.on{background:#185FA5;color:#fff;font-weight:600}
.sec{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sec-title{font-size:14px;font-weight:700;color:#0C447C;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid #E6F1FB}
.f{margin-bottom:.65rem}
.f label{font-size:11px;color:#666;display:block;margin-bottom:3px}
.f input,.f select{width:100%;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;outline:none;font-family:inherit}
.f input:focus,.f select:focus{border-color:#185FA5}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.r4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.alert-box{border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:.75rem;line-height:1.7}
.alert-blue{background:#E6F1FB;border:1px solid #185FA5;color:#0C447C}
.alert-ok{background:#E1F5EE;border:1px solid #1D9E75;color:#0F6E56}
.emp-card{border:1.5px solid #eee;border-radius:12px;padding:1rem;margin-bottom:.75rem}
.emp-header{display:flex;align-items:center;gap:8px;margin-bottom:.5rem;cursor:pointer}
.emp-detail{display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px solid #eee}
.emp-detail.open{display:block}
.add-btn{width:100%;padding:10px;border:2px dashed #185FA5;border-radius:10px;background:none;color:#185FA5;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:1rem;font-family:inherit}
.del-btn{padding:3px 8px;border:1px solid #E24B4A;border-radius:5px;background:#fff;color:#A32D2D;font-size:11px;cursor:pointer;font-family:inherit}
.ledger-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:.5rem}
.ledger-table th{background:#0C447C;color:#fff;padding:6px 4px;text-align:center;white-space:nowrap}
.ledger-table td{padding:6px 4px;border-bottom:1px solid #eee;text-align:right;white-space:nowrap}
.ledger-table td:first-child{text-align:left}
.ledger-table tr:nth-child(even) td{background:#fafafa}
.scroll-table{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cta-box{background:linear-gradient(135deg,#0C447C,#0A3D2B);border-radius:12px;padding:1.25rem;text-align:center;color:#fff;margin-top:1rem}
.cta-box h3{font-size:14px;font-weight:700;margin-bottom:6px}
.cta-box p{font-size:11px;opacity:.9;margin-bottom:10px;line-height:1.7}
.cta-btn{display:inline-block;background:#ffd700;color:#0A3D2B;font-weight:700;font-size:13px;padding:10px 24px;border-radius:8px;text-decoration:none}
.print-btn{width:100%;padding:10px;border:1.5px solid #185FA5;border-radius:10px;background:#E6F1FB;color:#0C447C;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:.5rem}
</style>
</head>
<body>
<div class="app">
<div class="demo-banner">
  🎯 GrantFlow 賃金台帳 自動生成ツール｜無料デモ版　ログイン不要
</div>
<div class="topbar">
  <h1>📒 賃金台帳 自動生成ツール</h1>
  <p>法定記載事項に対応した賃金台帳を自動生成<br>労働基準法で3年間の保存が義務付けられています</p>
</div>

<div class="tabs">
  <button class="tab on" onclick="switchTab('employees',this)">👤 従業員・給与情報</button>
  <button class="tab" onclick="switchTab('ledger',this)">📒 賃金台帳プレビュー</button>
  <button class="tab" onclick="switchTab('items',this)">📋 法定記載事項</button>
</div>

<div id="tab-employees"><div id="employees-content"></div></div>
<div id="tab-ledger" style="display:none"><div id="ledger-content"></div></div>
<div id="tab-items" style="display:none"><div id="items-content"></div></div>

<div class="cta-box">
  <h3>🌿 GrantFlow 本番版で複数月を一括管理</h3>
  <p>本番版では複数月分の賃金台帳を一括管理・<br>CSV/PDF出力・3年間の自動保存をご利用いただけます。<br>14日間無料トライアル実施中！</p>
  <a href="mailto:akira.sakamoto5135@gmail.com" class="cta-btn">📧 無料トライアルを申し込む</a>
  <div style="font-size:11px;opacity:.75;margin-top:6px">akira.sakamoto5135@gmail.com</div>
</div>
</div>

<script>
var employees = [];
var expanded = {};

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  ['employees','ledger','items'].forEach(function(t){
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
  });
  if(tab==='employees') renderEmployees();
  if(tab==='ledger') renderLedger();
  if(tab==='items') renderItems();
}

function addEmployee(){
  employees.push({
    name:'', emp_no:'', birthdate:'', join_date:'', gender:'', job:'',
    month:'', work_days:0, work_hours:0, ot_hours:0, night_hours:0, holiday_hours:0,
    base:0, position_allowance:0, commute_allowance:0, family_allowance:0, other_allowance:0,
    ot_pay:0, night_pay:0, holiday_pay:0,
    health_ins:0, pension_ins:0, emp_ins:0, income_tax:0, resident_tax:0, other_deduction:0
  });
  renderEmployees();
}
function delEmployee(i){if(!confirm('削除しますか？'))return;employees.splice(i,1);renderEmployees();}
function upEmployee(i,key,val){employees[i][key]=val;}
function upEmployeeNum(i,key,val){employees[i][key]=parseFloat(val)||0;}
function toggleExpand(i){expanded[i]=!expanded[i];renderEmployees();}

function calcTotals(emp){
  var totalPay = (parseFloat(emp.base)||0)+(parseFloat(emp.position_allowance)||0)+(parseFloat(emp.commute_allowance)||0)+(parseFloat(emp.family_allowance)||0)+(parseFloat(emp.other_allowance)||0)+(parseFloat(emp.ot_pay)||0)+(parseFloat(emp.night_pay)||0)+(parseFloat(emp.holiday_pay)||0);
  var totalDeduction = (parseFloat(emp.health_ins)||0)+(parseFloat(emp.pension_ins)||0)+(parseFloat(emp.emp_ins)||0)+(parseFloat(emp.income_tax)||0)+(parseFloat(emp.resident_tax)||0)+(parseFloat(emp.other_deduction)||0);
  var net = totalPay - totalDeduction;
  return {totalPay:totalPay, totalDeduction:totalDeduction, net:net};
}

function fmt(v){return Math.round(v).toLocaleString('ja-JP');}

function renderEmployees(){
  var html='';
  if(employees.length===0){
    html='<div class="sec"><div style="text-align:center;padding:2rem;color:#aaa;font-size:13px">従業員がまだ登録されていません。<br>下の「追加」ボタンから登録してください。</div></div>';
  } else {
    employees.forEach(function(emp,i){
      var isExp=expanded[i];
      var t=calcTotals(emp);
      html+='<div class="emp-card">';
      html+='<div class="emp-header" onclick="toggleExpand('+i+')">';
      html+='<div style="flex:1"><div style="font-size:13px;font-weight:700">'+(emp.name||'（氏名未入力）')+'</div>';
      html+='<div style="font-size:11px;color:#888">'+(emp.month||'対象月未入力')+(emp.job?' ／ '+emp.job:'')+'　差引支給額：'+fmt(t.net)+'円</div></div>';
      html+='<span style="font-size:12px;color:#aaa">'+(isExp?'▲':'▼')+'</span>';
      html+='</div>';
      html+='<div class="emp-detail'+(isExp?' open':'')+'">';

      html+='<div style="font-size:12px;font-weight:600;color:#0C447C;margin-bottom:6px">👤 基本情報</div>';
      html+='<div class="r3">';
      html+='<div class="f"><label>氏名</label><input type="text" value="'+escH(emp.name)+'" placeholder="氏名" oninput="upEmployee('+i+',\'name\',this.value)"></div>';
      html+='<div class="f"><label>従業員番号</label><input type="text" value="'+escH(emp.emp_no)+'" placeholder="例：001" oninput="upEmployee('+i+',\'emp_no\',this.value)"></div>';
      html+='<div class="f"><label>性別</label><select onchange="upEmployee('+i+',\'gender\',this.value)"><option value="">選択</option><option '+(emp.gender==='男性'?'selected':'')+'>男性</option><option '+(emp.gender==='女性'?'selected':'')+'>女性</option></select></div>';
      html+='<div class="f"><label>生年月日</label><input type="date" value="'+escH(emp.birthdate)+'" oninput="upEmployee('+i+',\'birthdate\',this.value)"></div>';
      html+='<div class="f"><label>雇入年月日</label><input type="date" value="'+escH(emp.join_date)+'" oninput="upEmployee('+i+',\'join_date\',this.value)"></div>';
      html+='<div class="f"><label>職種</label><input type="text" value="'+escH(emp.job)+'" placeholder="例：製造スタッフ" oninput="upEmployee('+i+',\'job\',this.value)"></div>';
      html+='</div>';

      html+='<div style="font-size:12px;font-weight:600;color:#0C447C;margin:.75rem 0 6px">📅 対象月・労働時間</div>';
      html+='<div class="r4">';
      html+='<div class="f"><label>対象月</label><input type="month" value="'+escH(emp.month)+'" oninput="upEmployee('+i+',\'month\',this.value)"></div>';
      html+='<div class="f"><label>労働日数</label><input type="number" value="'+emp.work_days+'" oninput="upEmployeeNum('+i+',\'work_days\',this.value)"></div>';
      html+='<div class="f"><label>労働時間数</label><input type="number" value="'+emp.work_hours+'" oninput="upEmployeeNum('+i+',\'work_hours\',this.value)"></div>';
      html+='<div class="f"><label>残業時間</label><input type="number" value="'+emp.ot_hours+'" oninput="upEmployeeNum('+i+',\'ot_hours\',this.value)"></div>';
      html+='<div class="f"><label>深夜労働時間</label><input type="number" value="'+emp.night_hours+'" oninput="upEmployeeNum('+i+',\'night_hours\',this.value)"></div>';
      html+='<div class="f"><label>休日労働時間</label><input type="number" value="'+emp.holiday_hours+'" oninput="upEmployeeNum('+i+',\'holiday_hours\',this.value)"></div>';
      html+='</div>';

      html+='<div style="font-size:12px;font-weight:600;color:#0C447C;margin:.75rem 0 6px">💰 支給額（円）</div>';
      html+='<div class="r3">';
      html+='<div class="f"><label>基本給</label><input type="number" value="'+emp.base+'" oninput="upEmployeeNum('+i+',\'base\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>役職手当</label><input type="number" value="'+emp.position_allowance+'" oninput="upEmployeeNum('+i+',\'position_allowance\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>通勤手当</label><input type="number" value="'+emp.commute_allowance+'" oninput="upEmployeeNum('+i+',\'commute_allowance\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>家族手当</label><input type="number" value="'+emp.family_allowance+'" oninput="upEmployeeNum('+i+',\'family_allowance\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>その他手当</label><input type="number" value="'+emp.other_allowance+'" oninput="upEmployeeNum('+i+',\'other_allowance\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>残業手当</label><input type="number" value="'+emp.ot_pay+'" oninput="upEmployeeNum('+i+',\'ot_pay\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>深夜手当</label><input type="number" value="'+emp.night_pay+'" oninput="upEmployeeNum('+i+',\'night_pay\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>休日手当</label><input type="number" value="'+emp.holiday_pay+'" oninput="upEmployeeNum('+i+',\'holiday_pay\',this.value);renderEmployees()"></div>';
      html+='</div>';

      html+='<div style="font-size:12px;font-weight:600;color:#0C447C;margin:.75rem 0 6px">➖ 控除額（円）</div>';
      html+='<div class="r3">';
      html+='<div class="f"><label>健康保険料</label><input type="number" value="'+emp.health_ins+'" oninput="upEmployeeNum('+i+',\'health_ins\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>厚生年金保険料</label><input type="number" value="'+emp.pension_ins+'" oninput="upEmployeeNum('+i+',\'pension_ins\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>雇用保険料</label><input type="number" value="'+emp.emp_ins+'" oninput="upEmployeeNum('+i+',\'emp_ins\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>所得税</label><input type="number" value="'+emp.income_tax+'" oninput="upEmployeeNum('+i+',\'income_tax\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>住民税</label><input type="number" value="'+emp.resident_tax+'" oninput="upEmployeeNum('+i+',\'resident_tax\',this.value);renderEmployees()"></div>';
      html+='<div class="f"><label>その他控除</label><input type="number" value="'+emp.other_deduction+'" oninput="upEmployeeNum('+i+',\'other_deduction\',this.value);renderEmployees()"></div>';
      html+='</div>';

      html+='<div style="background:#E6F1FB;border-radius:8px;padding:10px 12px;margin-top:.5rem;display:flex;justify-content:space-between;align-items:center">';
      html+='<span style="font-size:12px;font-weight:600;color:#0C447C">差引支給額</span>';
      html+='<span style="font-size:18px;font-weight:700;color:#0C447C">'+fmt(t.net)+'円</span>';
      html+='</div>';

      html+='<button class="del-btn" style="margin-top:.5rem" onclick="delEmployee('+i+')">🗑 削除</button>';
      html+='</div></div>';
    });
  }
  html+='<button class="add-btn" onclick="addEmployee()">＋ 従業員・対象月を追加</button>';
  document.getElementById('employees-content').innerHTML=html;
}

function renderLedger(){
  var html='<div class="sec"><div class="sec-title">📒 賃金台帳プレビュー</div>';
  if(employees.length===0){
    html+='<div style="text-align:center;color:#aaa;font-size:12px;padding:1rem">従業員・給与情報を入力すると賃金台帳が生成されます</div>';
  } else {
    html+='<div class="alert-blue">賃金台帳は労働基準法第108条により、労働者ごとに作成し、最終記入日から3年間保存する義務があります。</div>';
    html+='<div class="scroll-table"><table class="ledger-table">';
    html+='<tr><th>氏名</th><th>従業員番号</th><th>性別</th><th>職種</th><th>対象月</th><th>労働日数</th><th>労働時間</th><th>残業時間</th><th>深夜時間</th><th>休日時間</th><th>基本給</th><th>諸手当合計</th><th>支給合計</th><th>控除合計</th><th>差引支給額</th></tr>';
    employees.forEach(function(emp){
      var t=calcTotals(emp);
      var allowanceTotal=(parseFloat(emp.position_allowance)||0)+(parseFloat(emp.commute_allowance)||0)+(parseFloat(emp.family_allowance)||0)+(parseFloat(emp.other_allowance)||0)+(parseFloat(emp.ot_pay)||0)+(parseFloat(emp.night_pay)||0)+(parseFloat(emp.holiday_pay)||0);
      html+='<tr>';
      html+='<td>'+escH(emp.name||'—')+'</td>';
      html+='<td>'+escH(emp.emp_no||'—')+'</td>';
      html+='<td>'+escH(emp.gender||'—')+'</td>';
      html+='<td>'+escH(emp.job||'—')+'</td>';
      html+='<td>'+escH(emp.month||'—')+'</td>';
      html+='<td>'+emp.work_days+'日</td>';
      html+='<td>'+emp.work_hours+'h</td>';
      html+='<td>'+emp.ot_hours+'h</td>';
      html+='<td>'+emp.night_hours+'h</td>';
      html+='<td>'+emp.holiday_hours+'h</td>';
      html+='<td>'+fmt(emp.base)+'</td>';
      html+='<td>'+fmt(allowanceTotal)+'</td>';
      html+='<td>'+fmt(t.totalPay)+'</td>';
      html+='<td>'+fmt(t.totalDeduction)+'</td>';
      html+='<td>'+fmt(t.net)+'</td>';
      html+='</tr>';
    });
    html+='</table></div>';
    html+='<button class="print-btn" onclick="window.print()">🖨️ 印刷する</button>';
  }
  html+='</div>';
  document.getElementById('ledger-content').innerHTML=html;
}

function renderItems(){
  var html='<div class="sec"><div class="sec-title">📋 賃金台帳の法定記載事項</div>';
  html+='<div class="alert-blue">労働基準法第108条・労働基準法施行規則第54条により、以下の事項を記載することが義務付けられています。</div>';
  html+='<div style="font-size:12px;line-height:2;color:#333">';
  html+='① 氏名<br>';
  html+='② 性別<br>';
  html+='③ 賃金計算期間<br>';
  html+='④ 労働日数<br>';
  html+='⑤ 労働時間数<br>';
  html+='⑥ 時間外労働時間数・深夜労働時間数・休日労働時間数<br>';
  html+='⑦ 基本給・手当その他賃金の種類ごとにその額<br>';
  html+='⑧ 賃金の一部を控除した場合はその額';
  html+='</div>';
  html+='<div class="alert-ok" style="margin-top:.75rem">✓ 本ツールはこれら8項目すべてに対応した賃金台帳を生成します。</div>';

  html+='<div class="sec-title" style="margin-top:1rem">📌 保存期間・対象者</div>';
  html+='<div style="font-size:12px;line-height:1.8;color:#333">';
  html+='・保存期間：最後の記入をした日から<strong>3年間</strong>（労働基準法第109条）<br>';
  html+='・対象者：正社員・パート・アルバイト・契約社員等、<strong>すべての労働者</strong>（日雇労働者も一部記載事項が必要）<br>';
  html+='・賃金台帳は給与明細とは別物です。給与明細を発行していても賃金台帳の作成義務は別途必要です。';
  html+='</div>';

  html+='<div class="alert-box" style="background:#FCEBEB;border:1px solid #E24B4A;color:#A32D2D;margin-top:.75rem">🔴 違反した場合：30万円以下の罰金（労働基準法第120条）が科される可能性があります。</div>';
  html+='</div>';
  document.getElementById('items-content').innerHTML=html;
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
renderEmployees();
</script>
</body>
</html>
