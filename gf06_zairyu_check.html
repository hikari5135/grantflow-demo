<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;background:#f0f2f5;min-height:100vh;padding:1.5rem 1rem;display:flex;justify-content:center}
.app{max-width:720px;width:100%}

.topbar h1{font-size:15px;font-weight:700;margin-bottom:4px}

.sec{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sec-title{font-size:14px;font-weight:700;color:#185FA5;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid #E6F1FB}
.f{margin-bottom:.65rem}
.f label{font-size:11px;color:#666;display:block;margin-bottom:3px}
.f input,.f select{width:100%;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;outline:none}

.result-card.warn{background:#FAEEDA;border:1.5px solid #EF9F27}

.result-card.info{background:#E6F1FB;border:1.5px solid #185FA5}
.result-title{font-size:18px;font-weight:700;margin-bottom:6px}
.result-sub{font-size:12px;opacity:.85;line-height:1.6}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:#666}
.info-value{font-weight:600;color:#333}
.info-value.ok{color:#0F6E56}
.info-value.warn{color:#854F0B}
.info-value.ng{color:#A32D2D}

.badge-warn{background:#FAEEDA;color:#854F0B}
.badge-ng{background:#FCEBEB;color:#A32D2D}

.visa-card:hover{border-color:#185FA5;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.visa-card.selected{border-color:#185FA5;background:#EEF5FB}
.visa-name{font-size:14px;font-weight:700;color:#185FA5;margin-bottom:4px}
.visa-desc{font-size:11px;color:#666;line-height:1.6}
.visa-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}

.ind-btn.on{border-color:#185FA5;background:#E6F1FB;color:#185FA5;font-weight:500}
.alert-box{border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:.5rem;line-height:1.6}

var expiryItems = [];

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  ['check','list','expiry'].forEach(function(t){
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
  });
  if(tab==='list') renderVisaList();
  if(tab==='expiry') renderExpiryList();
}

function checkVisa() {
  var val = document.getElementById('visa-select').value;
  var el = document.getElementById('visa-result');
  if(!val){el.innerHTML='';return;}
  var v = VISAS[val];
  if(!v){el.innerHTML='';return;}

  var workOk = v.work.indexOf('制限なし')>=0||v.work.indexOf('就労可')>=0;
  var workRestricted = v.work.indexOf('28時間')>=0;
  var cls = workRestricted?'warn':workOk&&v.work.indexOf('指定')>=0?'info':workOk?'ok':'ng';

  var html = '<div class="result-card '+cls+'">';
  html += '<div class="result-title">'+v.name+'</div>';
  html += '<div class="result-sub">'+v.work+'</div>';
  html += '</div>';

  html += '<div class="sec">';
  html += '<div class="info-row"><span class="info-label">就労可否</span><span class="info-value '+(workRestricted?'warn':workOk?'ok':'ng')+'">'+v.work+'</span></div>';
  html += '<div class="info-row"><span class="info-label">就労制限</span><span class="info-value">'+v.restriction+'</span></div>';
  html += '<div class="info-row"><span class="info-label">労働時間</span><span class="info-value '+(workRestricted?'warn':'')+'">'+v.hours+'</span></div>';
  html += '<div class="info-row"><span class="info-label">在留期間</span><span class="info-value">'+v.update+'</span></div>';
  html += '<div class="info-row"><span class="info-label">家族帯同</span><span class="info-value">'+v.family+'</span></div>';
  html += '</div>';

  if(v.industries&&v.industries.length>0){
    html += '<div class="sec"><div style="font-size:12px;font-weight:600;color:#333;margin-bottom:8px">就労可能な業種・分野</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    v.industries.forEach(function(ind){
      html += '<span class="badge badge-blue">'+ind+'</span>';
    });
    html += '</div></div>';
  }

  html += '<div class="sec"><div style="font-size:12px;font-weight:600;color:#333;margin-bottom:8px">⚠ 注意事項</div>';
  v.points.forEach(function(p){
    html += '<div class="alert-box alert-warn" style="margin-bottom:4px">・'+p+'</div>';
  });
  html += '</div>';

  el.innerHTML = html;
}

function calcExpiry() {
  var dateStr = document.getElementById('expiry-input').value;
  var name = document.getElementById('name-input').value;
  var el = document.getElementById('expiry-result');
  if(!dateStr){el.innerHTML='';return;}
  try {
    var r = dateStr.match(/令和(\d+)年(\d+)月(\d+)日/);
    if(!r){el.innerHTML='<div class="alert-box alert-warn">形式：令和X年X月X日で入力してください</div>';return;}
    var y=2018+parseInt(r[1]),m=parseInt(r[2])-1,d=parseInt(r[3]);
    var days = Math.ceil((new Date(y,m,d)-new Date())/86400000);
    var cls = days<0?'ng':days<=30?'ng':days<=90?'warn':'ok';
    var msg = days<0?'期限切れ（'+Math.abs(days)+'日超過）':days===0?'本日期限！':days<=30?'あと'+days+'日（至急更新手続きを！）':days<=90?'あと'+days+'日（更新手続きを開始してください）':'あと'+days+'日';
    el.innerHTML = '<div class="result-card '+cls+'">'
      +'<div class="result-title">'+msg+'</div>'
      +'<div class="result-sub">'+(name?escH(name)+'さんの在留期限：':'')+escH(dateStr)+'</div>'
      +'</div>'
      +(days<=90&&days>=0?'<div class="alert-box alert-warn">⚠ 在留期限の3か月前から更新手続きが可能です。早めに手続きを開始してください。</div>':'')
      +(days<0?'<div class="alert-box alert-ng">🔴 在留期限が切れています。直ちに入管局に相談してください。期限切れのまま就労させると不法就労助長罪になります。</div>':'');
  } catch(e){el.innerHTML='';}
}

function renderVisaList() {
  var html = '';
  Object.keys(VISAS).forEach(function(key){
    var v = VISAS[key];
    var workOk = v.work.indexOf('制限なし')>=0;
    var workRestricted = v.work.indexOf('28時間')>=0;
    var workLimited = v.work.indexOf('指定')>=0||v.work.indexOf('計画')>=0;
    var badgeCls = workRestricted?'badge-warn':workOk?'badge-ok':workLimited?'badge-blue':'badge-ng';
    var badgeLbl = workRestricted?'条件付就労':workOk?'就労制限なし':workLimited?'指定業務のみ':'要資格外活動許可';
    html += '<div class="sec" style="margin-bottom:.75rem">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem">';
    html += '<div style="font-size:14px;font-weight:700;color:#185FA5;flex:1">'+v.name+'</div>';
    html += '<span class="badge '+badgeCls+'">'+badgeLbl+'</span>';
    html += '</div>';
    html += '<div class="info-row"><span class="info-label">就労</span><span class="info-value" style="font-size:12px">'+v.work+'</span></div>';
    html += '<div class="info-row"><span class="info-label">在留期間</span><span class="info-value" style="font-size:12px">'+v.update+'</span></div>';
    html += '<div class="info-row"><span class="info-label">家族帯同</span><span class="info-value" style="font-size:12px">'+v.family+'</span></div>';
    html += '</div>';
  });
  document.getElementById('visa-list-content').innerHTML = html;
}

function addExpiryItem() {
  expiryItems.push({name:'',visa:'',expiry:''});
  renderExpiryList();
}

function updateExpiry(i,key,val){ expiryItems[i][key]=val; renderExpiryList(); }
function delExpiry(i){ expiryItems.splice(i,1); renderExpiryList(); }

function renderExpiryList() {
  var html = '';
  if(expiryItems.length===0){
    html='<div style="text-align:center;color:#aaa;font-size:12px;padding:1rem">「追加する」ボタンからスタッフを追加してください</div>';
  } else {
    expiryItems.forEach(function(item,i){
      var days = null;
      if(item.expiry){
        try{
          var r=item.expiry.match(/令和(\d+)年(\d+)月(\d+)日/);
          if(r){var y=2018+parseInt(r[1]),m=parseInt(r[2])-1,d=parseInt(r[3]);days=Math.ceil((new Date(y,m,d)-new Date())/86400000);}
        }catch(e){}
      }
      var st = days===null?'gray':days<0?'ng':days<=30?'ng':days<=90?'warn':'ok';
      var stLabel = days===null?'—':days<0?Math.abs(days)+'日超過':days===0?'本日期限':'あと'+days+'日';
      html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #eee;flex-wrap:wrap">';
      html += '<input type="text" value="'+escH(item.name)+'" placeholder="氏名" style="width:120px;font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:6px" oninput="updateExpiry('+i+',\'name\',this.value)">';
      html += '<input type="text" value="'+escH(item.expiry)+'" placeholder="令和X年X月X日" style="flex:1;min-width:140px;font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:6px" oninput="updateExpiry('+i+',\'expiry\',this.value)">';
      html += '<span class="badge '+(st==='ok'?'badge-ok':st==='warn'?'badge-warn':st==='ng'?'badge-ng':'badge-gray')+'">'+stLabel+'</span>';
      html += '<button onclick="delExpiry('+i+')" style="padding:3px 8px;border:1px solid #E24B4A;border-radius:5px;background:#fff;color:#A32D2D;font-size:11px;cursor:pointer">削除</button>';
      html += '</div>';
    });
  }
  document.getElementById('expiry-list-content').innerHTML = html;
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
