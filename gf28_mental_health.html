<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>外国人スタッフ メンタル健康管理システム｜GrantFlow デモ版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;background:#f0f2f5;min-height:100vh;padding:1.5rem 1rem;display:flex;justify-content:center}
.app{max-width:760px;width:100%}
.demo-banner{background:linear-gradient(135deg,#533AB7,#7C5DE0);border-radius:12px;padding:10px 16px;margin-bottom:1rem;color:#fff;text-align:center;font-size:11px}
.topbar{background:linear-gradient(135deg,#5B7FA6,#8AAACC);border-radius:12px;padding:14px 16px;margin-bottom:1rem;color:#fff;text-align:center}
.topbar h1{font-size:15px;font-weight:700;margin-bottom:4px}
.topbar p{font-size:11px;opacity:.85;line-height:1.6}
.tabs{display:flex;gap:4px;margin-bottom:1rem;background:#fff;border-radius:10px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tab{flex:1;padding:8px 4px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;border-radius:7px;color:#666;border:none;background:none;font-family:inherit}
.tab.on{background:#5B7FA6;color:#fff;font-weight:600}
.sec{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sec-title{font-size:14px;font-weight:700;color:#3D5A7A;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid #EBF0F6}
.f{margin-bottom:.65rem}
.f label{font-size:11px;color:#666;display:block;margin-bottom:3px}
.f input,.f select,.f textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;outline:none;font-family:inherit}
.f input:focus,.f select:focus,.f textarea:focus{border-color:#5B7FA6}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.badge-ok{background:#E1F5EE;color:#0F6E56}
.badge-warn{background:#FAEEDA;color:#854F0B}
.badge-ng{background:#FCEBEB;color:#A32D2D}
.badge-blue{background:#EBF0F6;color:#3D5A7A}
.badge-gray{background:#f0f0f0;color:#666}
.alert-box{border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:.75rem;line-height:1.7}
.alert-ok{background:#E1F5EE;border:1px solid #1D9E75;color:#0F6E56}
.alert-warn{background:#FAEEDA;border:1px solid #EF9F27;color:#854F0B}
.alert-ng{background:#FCEBEB;border:1px solid #E24B4A;color:#A32D2D}
.alert-blue{background:#EBF0F6;border:1px solid #5B7FA6;color:#3D5A7A}
.staff-card{border:1.5px solid #eee;border-radius:12px;padding:1rem;margin-bottom:.75rem}
.staff-card.risk-high{border-color:#E24B4A;background:#FFF5F5}
.staff-card.risk-mid{border-color:#EF9F27;background:#FFFBF0}
.staff-card.risk-low{border-color:#1D9E75;background:#F0FFF8}
.staff-header{display:flex;align-items:center;gap:8px;margin-bottom:.5rem;cursor:pointer}
.staff-detail{display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px solid #eee}
.staff-detail.open{display:block}
.add-btn{width:100%;padding:10px;border:2px dashed #5B7FA6;border-radius:10px;background:none;color:#5B7FA6;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:1rem;font-family:inherit}
.del-btn{padding:3px 8px;border:1px solid #E24B4A;border-radius:5px;background:#fff;color:#A32D2D;font-size:11px;cursor:pointer;font-family:inherit}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.summary-card{text-align:center;padding:10px 6px;border-radius:10px;border:1px solid #eee}
.summary-num{font-size:20px;font-weight:700}
.summary-label{font-size:10px;color:#666;margin-top:2px}
.scale-btns{display:flex;gap:4px;margin-top:4px}
.scale-btn{flex:1;padding:8px 0;border:1.5px solid #ddd;border-radius:6px;background:#fff;font-size:11px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit}
.scale-btn.selected{background:#5B7FA6;color:#fff;border-color:#5B7FA6}
.cta-box{background:linear-gradient(135deg,#3D5A7A,#0A3D2B);border-radius:12px;padding:1.25rem;text-align:center;color:#fff;margin-top:1rem}
.cta-box h3{font-size:14px;font-weight:700;margin-bottom:6px}
.cta-box p{font-size:11px;opacity:.9;margin-bottom:10px;line-height:1.7}
.cta-btn{display:inline-block;background:#ffd700;color:#0A3D2B;font-weight:700;font-size:13px;padding:10px 24px;border-radius:8px;text-decoration:none}
</style>
</head>
<body>
<div class="app">
<div class="demo-banner">
  🎯 GrantFlow 外国人スタッフ メンタル健康管理システム｜無料デモ版　ログイン不要
</div>
<div class="topbar">
  <h1>💚 外国人スタッフ メンタル健康管理システム</h1>
  <p>定期面談・ストレス状況を記録し早期発見につなげる<br>言語・文化の壁による孤立リスクを可視化</p>
</div>

<div class="tabs">
  <button class="tab on" onclick="switchTab('staff',this)">👤 スタッフ別記録</button>
  <button class="tab" onclick="switchTab('checklist',this)">📋 面談チェック項目</button>
  <button class="tab" onclick="switchTab('summary',this)">📊 リスクサマリー</button>
</div>

<div id="tab-staff"><div id="staff-content"></div></div>
<div id="tab-checklist" style="display:none"><div id="checklist-content"></div></div>
<div id="tab-summary" style="display:none"><div id="summary-content"></div></div>

<div class="cta-box">
  <h3>🌿 GrantFlow 本番版でさらに便利に</h3>
  <p>本番版ではクラウド保存・面談記録の履歴管理・<br>相談窓口連携をご利用いただけます。<br>14日間無料トライアル実施中！</p>
  <a href="https://forms.gle/xrgH2CtGaCL7LXHE6" target="_blank" class="cta-btn">📝 無料トライアルを申し込む</a>
  <div style="font-size:11px;opacity:.75;margin-top:6px">akira.sakamoto5135@gmail.com</div>
</div>
</div>

<script>
var staffList = [];
var expanded = {};

var NATIONALITIES = ['ベトナム','中国','フィリピン','インドネシア','ミャンマー','タイ','カンボジア','その他'];

var CHECK_QUESTIONS = [
  {id:'q1', title:'最近、よく眠れていますか？'},
  {id:'q2', title:'食欲はありますか？'},
  {id:'q3', title:'仕事に対するやる気はありますか？'},
  {id:'q4', title:'同僚や上司と話せていますか？'},
  {id:'q5', title:'休日は何をして過ごしていますか？'},
  {id:'q6', title:'家族や母国の友人と連絡を取れていますか？'},
  {id:'q7', title:'日本での生活に困っていることはありますか？'},
  {id:'q8', title:'仕事内容について不安や悩みはありますか？'}
];

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  ['staff','checklist','summary'].forEach(function(t){
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
  });
  if(tab==='staff') renderStaff();
  if(tab==='checklist') renderChecklist();
  if(tab==='summary') renderSummary();
}

function addStaffMember(){
  staffList.push({name:'',nationality:'ベトナム',lastInterview:'',sleepScore:0,moodScore:0,communicationScore:0,memo:''});
  renderStaff();
}
function delStaffMember(i){if(!confirm('削除しますか？'))return;staffList.splice(i,1);renderStaff();}
function upStaffMember(i,key,val){staffList[i][key]=val;renderStaff();}
function setScore(i,key,val){staffList[i][key]=val;renderStaff();}
function toggleExpand(i){expanded[i]=!expanded[i];renderStaff();}

function getRiskLevel(s){
  var total=(parseInt(s.sleepScore)||0)+(parseInt(s.moodScore)||0)+(parseInt(s.communicationScore)||0);
  if(total===0) return 'none';
  var avg=total/3;
  if(avg<=2) return 'high';
  if(avg<=3.5) return 'mid';
  return 'low';
}

function renderStaff(){
  var html='';
  if(staffList.length===0){
    html='<div class="sec"><div style="text-align:center;padding:2rem;color:#aaa;font-size:13px">スタッフがまだ登録されていません。<br>下の「追加」ボタンから登録してください。</div></div>';
  } else {
    staffList.forEach(function(s,i){
      var isExp=expanded[i];
      var risk=getRiskLevel(s);
      var cardCls=risk==='high'?'risk-high':risk==='mid'?'risk-mid':risk==='low'?'risk-low':'';
      var riskLabel=risk==='high'?'要注意':risk==='mid'?'経過観察':risk==='low'?'良好':'未評価';
      var badgeCls=risk==='high'?'badge-ng':risk==='mid'?'badge-warn':risk==='low'?'badge-ok':'badge-gray';

      html+='<div class="staff-card '+cardCls+'">';
      html+='<div class="staff-header" onclick="toggleExpand('+i+')">';
      html+='<div style="flex:1">';
      html+='<div style="font-size:13px;font-weight:700">'+(s.name||'（氏名未入力）')+'</div>';
      html+='<div style="font-size:11px;color:#888">'+escH(s.nationality)+'　最終面談：'+(s.lastInterview||'未実施')+'</div>';
      html+='</div>';
      html+='<span class="badge '+badgeCls+'">'+riskLabel+'</span>';
      html+='<span style="font-size:12px;color:#aaa;margin-left:4px">'+(isExp?'▲':'▼')+'</span>';
      html+='</div>';
      html+='<div class="staff-detail'+(isExp?' open':'')+'">';
      html+='<div class="r2">';
      html+='<div class="f"><label>氏名</label><input type="text" value="'+escH(s.name)+'" placeholder="氏名" oninput="upStaffMember('+i+',\'name\',this.value)"></div>';
      html+='<div class="f"><label>国籍</label><select onchange="upStaffMember('+i+',\'nationality\',this.value)">'+NATIONALITIES.map(function(n){return'<option '+(s.nationality===n?'selected':'')+'>'+n+'</option>';}).join('')+'</select></div>';
      html+='<div class="f" style="grid-column:1/-1"><label>最終面談日</label><input type="date" value="'+escH(s.lastInterview)+'" oninput="upStaffMember('+i+',\'lastInterview\',this.value)"></div>';
      html+='</div>';

      html+='<div style="font-size:12px;font-weight:600;color:#3D5A7A;margin:.75rem 0 4px">睡眠状態（1:悪い〜5:良い）</div>';
      html+='<div class="scale-btns">';
      for(var n=1;n<=5;n++){
        html+='<div class="scale-btn'+(parseInt(s.sleepScore)===n?' selected':'')+'" onclick="setScore('+i+',\'sleepScore\','+n+')">'+n+'</div>';
      }
      html+='</div>';

      html+='<div style="font-size:12px;font-weight:600;color:#3D5A7A;margin:.75rem 0 4px">気分・意欲（1:悪い〜5:良い）</div>';
      html+='<div class="scale-btns">';
      for(var n=1;n<=5;n++){
        html+='<div class="scale-btn'+(parseInt(s.moodScore)===n?' selected':'')+'" onclick="setScore('+i+',\'moodScore\','+n+')">'+n+'</div>';
      }
      html+='</div>';

      html+='<div style="font-size:12px;font-weight:600;color:#3D5A7A;margin:.75rem 0 4px">職場コミュニケーション（1:悪い〜5:良い）</div>';
      html+='<div class="scale-btns">';
      for(var n=1;n<=5;n++){
        html+='<div class="scale-btn'+(parseInt(s.communicationScore)===n?' selected':'')+'" onclick="setScore('+i+',\'communicationScore\','+n+')">'+n+'</div>';
      }
      html+='</div>';

      html+='<div class="f" style="margin-top:.75rem"><label>面談メモ</label><textarea rows="2" oninput="upStaffMember('+i+',\'memo\',this.value)">'+escH(s.memo)+'</textarea></div>';

      if(risk==='high'){
        html+='<div class="alert-ng">🔴 要注意レベルです。早急に個別面談を実施し、必要に応じて専門相談窓口への連携を検討してください。</div>';
      } else if(risk==='mid'){
        html+='<div class="alert-warn">🟡 経過観察が必要です。次回面談まで様子を見守ってください。</div>';
      }

      html+='<button class="del-btn" style="margin-top:.5rem" onclick="delStaffMember('+i+')">🗑 削除</button>';
      html+='</div></div>';
    });
  }
  html+='<button class="add-btn" onclick="addStaffMember()">＋ スタッフを追加</button>';
  document.getElementById('staff-content').innerHTML=html;
}

function renderChecklist(){
  var html='<div class="sec"><div class="sec-title">📋 定期面談 確認項目</div>';
  html+='<div class="alert-blue">3か月に1回以上の定期面談（特定技能の支援計画上の義務）の際に活用できる確認項目です。</div>';
  CHECK_QUESTIONS.forEach(function(q,idx){
    html+='<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px"><strong>Q'+(idx+1)+'.</strong> '+q.title+'</div>';
  });
  html+='<div class="alert-warn" style="margin-top:.75rem">🟡 「困っている」「不安がある」という回答があった場合は、具体的な内容を聞き取り、必要な支援につなげてください。</div>';
  html+='</div>';
  document.getElementById('checklist-content').innerHTML=html;
}

function renderSummary(){
  var html='<div class="sec"><div class="sec-title">📊 リスクサマリー</div>';
  if(staffList.length===0){
    html+='<div style="text-align:center;color:#aaa;font-size:12px;padding:1rem">スタッフ別記録タブでスタッフを登録するとサマリーが表示されます</div>';
  } else {
    var high=staffList.filter(function(s){return getRiskLevel(s)==='high';}).length;
    var mid=staffList.filter(function(s){return getRiskLevel(s)==='mid';}).length;
    var low=staffList.filter(function(s){return getRiskLevel(s)==='low';}).length;
    var none=staffList.filter(function(s){return getRiskLevel(s)==='none';}).length;

    html+='<div class="summary-grid">';
    html+='<div class="summary-card" style="background:#FCEBEB;border-color:#E24B4A"><div class="summary-num" style="color:#A32D2D">'+high+'</div><div class="summary-label">要注意</div></div>';
    html+='<div class="summary-card" style="background:#FAEEDA;border-color:#EF9F27"><div class="summary-num" style="color:#854F0B">'+mid+'</div><div class="summary-label">経過観察</div></div>';
    html+='<div class="summary-card" style="background:#E1F5EE;border-color:#1D9E75"><div class="summary-num" style="color:#0F6E56">'+low+'</div><div class="summary-label">良好</div></div>';
    html+='<div class="summary-card"><div class="summary-num" style="color:#888">'+none+'</div><div class="summary-label">未評価</div></div>';
    html+='</div>';

    if(high>0){
      html+='<div style="font-size:12px;font-weight:600;color:#A32D2D;margin:1rem 0 6px">🔴 要注意のスタッフ</div>';
      staffList.filter(function(s){return getRiskLevel(s)==='high';}).forEach(function(s){
        html+='<div class="alert-ng">'+escH(s.name||'（氏名未入力）')+'（'+escH(s.nationality)+'）</div>';
      });
    }
  }
  html+='</div>';
  document.getElementById('summary-content').innerHTML=html;
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
renderStaff();
</script>
</body>
</html>
