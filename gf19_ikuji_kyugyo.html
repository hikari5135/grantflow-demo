<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>育児休業 取得管理システム｜GrantFlow デモ版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;background:#f0f2f5;min-height:100vh;padding:1.5rem 1rem;display:flex;justify-content:center}
.app{max-width:760px;width:100%}
.demo-banner{background:linear-gradient(135deg,#533AB7,#7C5DE0);border-radius:12px;padding:10px 16px;margin-bottom:1rem;color:#fff;text-align:center;font-size:11px}
.topbar{background:linear-gradient(135deg,#C2436B,#E1729B);border-radius:12px;padding:14px 16px;margin-bottom:1rem;color:#fff;text-align:center}
.topbar h1{font-size:15px;font-weight:700;margin-bottom:4px}
.topbar p{font-size:11px;opacity:.85;line-height:1.6}
.tabs{display:flex;gap:4px;margin-bottom:1rem;background:#fff;border-radius:10px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tab{flex:1;padding:8px 4px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;border-radius:7px;color:#666;border:none;background:none;font-family:inherit}
.tab.on{background:#C2436B;color:#fff;font-weight:600}
.sec{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sec-title{font-size:14px;font-weight:700;color:#A03158;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid #FCE8EF}
.f{margin-bottom:.65rem}
.f label{font-size:11px;color:#666;display:block;margin-bottom:3px}
.f input,.f select,.f textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;outline:none;font-family:inherit}
.f input:focus,.f select:focus,.f textarea:focus{border-color:#C2436B}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.badge-ok{background:#E1F5EE;color:#0F6E56}
.badge-warn{background:#FAEEDA;color:#854F0B}
.badge-ng{background:#FCEBEB;color:#A32D2D}
.badge-blue{background:#E6F1FB;color:#185FA5}
.badge-pink{background:#FCE8EF;color:#A03158}
.badge-gray{background:#f0f0f0;color:#666}
.alert-box{border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:.75rem;line-height:1.7}
.alert-ok{background:#E1F5EE;border:1px solid #1D9E75;color:#0F6E56}
.alert-warn{background:#FAEEDA;border:1px solid #EF9F27;color:#854F0B}
.alert-ng{background:#FCEBEB;border:1px solid #E24B4A;color:#A32D2D}
.alert-pink{background:#FCE8EF;border:1px solid #C2436B;color:#A03158}
.emp-card{border:1.5px solid #eee;border-radius:12px;padding:1rem;margin-bottom:.75rem}
.emp-card.male{border-color:#185FA5;background:#EBF5FB}
.emp-card.female{border-color:#C2436B;background:#FFF5F8}
.emp-card.done{border-color:#1D9E75;background:#F0FFF8}
.emp-header{display:flex;align-items:center;gap:8px;margin-bottom:.5rem;cursor:pointer}
.emp-detail{display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px solid #eee}
.emp-detail.open{display:block}
.add-btn{width:100%;padding:10px;border:2px dashed #C2436B;border-radius:10px;background:none;color:#C2436B;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:1rem;font-family:inherit}
.del-btn{padding:3px 8px;border:1px solid #E24B4A;border-radius:5px;background:#fff;color:#A32D2D;font-size:11px;cursor:pointer;font-family:inherit}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.summary-card{text-align:center;padding:10px 6px;border-radius:10px;border:1px solid #eee}
.summary-num{font-size:20px;font-weight:700}
.summary-label{font-size:10px;color:#666;margin-top:2px}
.progress-bar-bg{height:8px;background:#eee;border-radius:4px;margin-top:6px}
.progress-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.calc-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:13px}
.calc-row:last-child{border-bottom:none}
.calc-row.total{font-weight:700;font-size:14px;padding-top:8px}
.allowance-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:.75rem}
.allowance-table th{background:#C2436B;color:#fff;padding:8px 10px;text-align:left}
.allowance-table td{padding:7px 10px;border-bottom:1px solid #eee}
.allowance-table tr:nth-child(even) td{background:#fafafa}
.cta-box{background:linear-gradient(135deg,#A03158,#0A3D2B);border-radius:12px;padding:1.25rem;text-align:center;color:#fff;margin-top:1rem}
.cta-box h3{font-size:14px;font-weight:700;margin-bottom:6px}
.cta-box p{font-size:11px;opacity:.9;margin-bottom:10px;line-height:1.7}
.cta-btn{display:inline-block;background:#ffd700;color:#0A3D2B;font-weight:700;font-size:13px;padding:10px 24px;border-radius:8px;text-decoration:none}
</style>
</head>
<body>
<div class="app">
<div class="demo-banner">
  🎯 GrantFlow 育児休業 取得管理システム｜無料デモ版　ログイン不要
</div>
<div class="topbar">
  <h1>👶 育児休業 取得管理システム</h1>
  <p>男性育休の取得率公表義務・取得状況を一元管理<br>2023年4月から従業員1,000人超の企業は取得率公表が義務化</p>
</div>

<div class="tabs">
  <button class="tab on" onclick="switchTab('employees',this)">👤 取得状況管理</button>
  <button class="tab" onclick="switchTab('summary',this)">📊 取得率サマリー</button>
  <button class="tab" onclick="switchTab('rules',this)">📋 制度・給付ガイド</button>
</div>

<div id="tab-employees"><div id="employees-content"></div></div>
<div id="tab-summary" style="display:none"><div id="summary-content"></div></div>
<div id="tab-rules" style="display:none"><div id="rules-content"></div></div>

<div class="cta-box">
  <h3>🌿 GrantFlow 本番版で取得率を自動公表</h3>
  <p>本番版では取得率の自動集計・<br>公表用フォーマットの自動生成・取得勧奨の記録管理ができます。<br>14日間無料トライアル実施中！</p>
  <a href="mailto:akira.sakamoto5135@gmail.com" class="cta-btn">📧 無料トライアルを申し込む</a>
  <div style="font-size:11px;opacity:.75;margin-top:6px">akira.sakamoto5135@gmail.com</div>
</div>
</div>

<script>
var employees = [];
var expanded = {};

var LEAVE_TYPES = ['産前産後休業','育児休業','産後パパ育休（出生時育児休業）','育児短時間勤務','子の看護休暇'];
var STATUS_TYPES = ['対象者（未申出）','申出済','取得中','取得完了','取得予定なし'];

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  ['employees','summary','rules'].forEach(function(t){
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
  });
  if(tab==='employees') renderEmployees();
  if(tab==='summary') renderSummary();
  if(tab==='rules') renderRules();
}

function addEmployee(){
  employees.push({
    name:'', gender:'', dept:'', child_birth:'', leave_type:'育児休業',
    status:'対象者（未申出）', start_date:'', end_date:'', notify_date:'', memo:''
  });
  renderEmployees();
}
function delEmployee(i){if(!confirm('削除しますか？'))return;employees.splice(i,1);renderEmployees();}
function upEmployee(i,key,val){employees[i][key]=val;renderEmployees();}
function toggleExpand(i){expanded[i]=!expanded[i];renderEmployees();}

function daysUntil(dateStr){
  if(!dateStr) return null;
  try{var d=new Date(dateStr);return Math.ceil((d-new Date())/86400000);}catch(e){return null;}
}

function getCardCls(emp){
  if(emp.status==='取得完了'||emp.status==='取得中') return 'done';
  if(emp.gender==='男性') return 'male';
  if(emp.gender==='女性') return 'female';
  return '';
}

function renderEmployees(){
  var html='';
  if(employees.length===0){
    html='<div class="sec"><div style="text-align:center;padding:2rem;color:#aaa;font-size:13px">対象者がまだ登録されていません。<br>下の「追加」ボタンから登録してください。</div></div>';
  } else {
    employees.forEach(function(emp,i){
      var isExp=expanded[i];
      var notifyDays=daysUntil(emp.notify_date);
      html+='<div class="emp-card '+getCardCls(emp)+'">';
      html+='<div class="emp-header" onclick="toggleExpand('+i+')">';
      html+='<div style="flex:1">';
      html+='<div style="font-size:13px;font-weight:700">'+(emp.name||'（氏名未入力）')+'　'+(emp.gender?'<span style="font-size:11px;color:#888">（'+emp.gender+'）</span>':'')+'</div>';
      html+='<div style="font-size:11px;color:#888">'+(emp.dept||'部署未入力')+' ／ '+(emp.leave_type||'種別未選択')+'</div>';
      html+='</div>';
      var badgeCls=emp.status==='取得完了'?'badge-ok':emp.status==='取得中'?'badge-blue':emp.status==='申出済'?'badge-pink':emp.status==='取得予定なし'?'badge-gray':'badge-warn';
      html+='<span class="badge '+badgeCls+'">'+emp.status+'</span>';
      html+='<span style="font-size:12px;color:#aaa;margin-left:4px">'+(isExp?'▲':'▼')+'</span>';
      html+='</div>';
      html+='<div class="emp-detail'+(isExp?' open':'')+'">';
      html+='<div class="r3">';
      html+='<div class="f"><label>氏名</label><input type="text" value="'+escH(emp.name)+'" placeholder="氏名" oninput="upEmployee('+i+',\'name\',this.value)"></div>';
      html+='<div class="f"><label>性別</label><select onchange="upEmployee('+i+',\'gender\',this.value)"><option value="">選択</option><option '+(emp.gender==='男性'?'selected':'')+'>男性</option><option '+(emp.gender==='女性'?'selected':'')+'>女性</option></select></div>';
      html+='<div class="f"><label>部署</label><input type="text" value="'+escH(emp.dept)+'" placeholder="部署名" oninput="upEmployee('+i+',\'dept\',this.value)"></div>';
      html+='<div class="f"><label>子の出生日（予定）</label><input type="date" value="'+escH(emp.child_birth)+'" oninput="upEmployee('+i+',\'child_birth\',this.value)"></div>';
      html+='<div class="f"><label>制度区分</label><select onchange="upEmployee('+i+',\'leave_type\',this.value)">'+LEAVE_TYPES.map(function(t){return'<option '+(emp.leave_type===t?'selected':'')+'>'+t+'</option>';}).join('')+'</select></div>';
      html+='<div class="f"><label>取得状況</label><select onchange="upEmployee('+i+',\'status\',this.value)">'+STATUS_TYPES.map(function(s){return'<option '+(emp.status===s?'selected':'')+'>'+s+'</option>';}).join('')+'</select></div>';
      html+='<div class="f"><label>申出日</label><input type="date" value="'+escH(emp.notify_date)+'" oninput="upEmployee('+i+',\'notify_date\',this.value)"></div>';
      html+='<div class="f"><label>休業開始日</label><input type="date" value="'+escH(emp.start_date)+'" oninput="upEmployee('+i+',\'start_date\',this.value)"></div>';
      html+='<div class="f"><label>休業終了日（予定）</label><input type="date" value="'+escH(emp.end_date)+'" oninput="upEmployee('+i+',\'end_date\',this.value)"></div>';
      html+='</div>';
      html+='<div class="f"><label>メモ</label><input type="text" value="'+escH(emp.memo)+'" placeholder="個別事情・面談記録等" oninput="upEmployee('+i+',\'memo\',this.value)"></div>';
      if(emp.gender==='男性'&&(emp.status==='対象者（未申出）')){
        html+='<div class="alert-pink">🌸 男性従業員への育休制度の周知・取得意向確認は事業主の義務です（2022年4月施行）。個別に説明を行ってください。</div>';
      }
      html+='<button class="del-btn" onclick="delEmployee('+i+')">🗑 削除</button>';
      html+='</div></div>';
    });
  }
  html+='<button class="add-btn" onclick="addEmployee()">＋ 対象者を追加</button>';
  document.getElementById('employees-content').innerHTML=html;
}

function renderSummary(){
  var total=employees.length;
  var male=employees.filter(function(e){return e.gender==='男性';});
  var female=employees.filter(function(e){return e.gender==='女性';});
  var maleTaken=male.filter(function(e){return e.status==='取得中'||e.status==='取得完了';});
  var femaleTaken=female.filter(function(e){return e.status==='取得中'||e.status==='取得完了';});
  var malePct=male.length>0?Math.round(maleTaken.length/male.length*100):0;
  var femalePct=female.length>0?Math.round(femaleTaken.length/female.length*100):0;

  var html='<div class="sec"><div class="sec-title">📊 育休取得率サマリー</div>';
  html+='<div class="alert-pink">従業員数1,000人超の企業は、男性の育児休業等取得率を年1回公表する義務があります（2023年4月〜）。</div>';

  html+='<div class="summary-grid">';
  html+='<div class="summary-card"><div class="summary-num" style="color:#C2436B">'+total+'</div><div class="summary-label">対象者数</div></div>';
  html+='<div class="summary-card"><div class="summary-num" style="color:#185FA5">'+male.length+'</div><div class="summary-label">男性対象者</div></div>';
  html+='<div class="summary-card"><div class="summary-num" style="color:#C2436B">'+female.length+'</div><div class="summary-label">女性対象者</div></div>';
  html+='<div class="summary-card"><div class="summary-num" style="color:#0F6E56">'+(maleTaken.length+femaleTaken.length)+'</div><div class="summary-label">取得済・取得中</div></div>';
  html+='</div>';

  html+='<div style="margin-top:1rem">';
  html+='<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:600">男性育休取得率</span><span style="font-weight:700;color:#185FA5">'+malePct+'%</span></div>';
  html+='<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+malePct+'%;background:#185FA5"></div></div>';
  html+='</div>';

  html+='<div style="margin-top:.75rem">';
  html+='<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:600">女性育休取得率</span><span style="font-weight:700;color:#C2436B">'+femalePct+'%</span></div>';
  html+='<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+femalePct+'%;background:#C2436B"></div></div>';
  html+='</div>';

  var notNotified=employees.filter(function(e){return e.status==='対象者（未申出）';});
  if(notNotified.length>0){
    html+='<div style="font-size:12px;font-weight:600;color:#854F0B;margin:1rem 0 6px">🟡 制度周知・取得意向確認が必要な対象者</div>';
    notNotified.forEach(function(e){
      html+='<div class="alert-warn">'+escH(e.name||'（氏名未入力）')+'（'+(e.gender||'性別未選択')+' ／ '+(e.dept||'部署未入力')+'）</div>';
    });
  }

  if(total===0){
    html+='<div style="text-align:center;color:#aaa;font-size:12px;padding:1rem;margin-top:1rem">取得状況管理タブで対象者を登録するとサマリーが表示されます</div>';
  }

  html+='</div>';
  document.getElementById('summary-content').innerHTML=html;
}

function renderRules(){
  var html='<div class="sec"><div class="sec-title">📋 育児休業等の制度・給付ガイド</div>';

  html+='<table class="allowance-table">';
  html+='<tr><th>制度</th><th>概要</th></tr>';
  html+='<tr><td>産前産後休業</td><td>産前6週間（多胎妊娠14週間）・産後8週間。産後6週間は本人の請求があっても就業させることは原則禁止</td></tr>';
  html+='<tr><td>育児休業</td><td>原則子が1歳になるまで（最長2歳まで延長可）。男女とも取得可能</td></tr>';
  html+='<tr><td>産後パパ育休（出生時育児休業）</td><td>子の出生後8週間以内に4週間まで取得可能。2回に分割取得も可能</td></tr>';
  html+='<tr><td>育児短時間勤務</td><td>3歳未満の子を養育する従業員は1日6時間の短時間勤務を選択可能</td></tr>';
  html+='<tr><td>子の看護休暇</td><td>小学校3年生修了までの子の通院・看護等のため年5日（2人以上は10日）取得可能</td></tr>';
  html+='</table>';

  html+='<div class="sec-title" style="margin-top:1rem">💰 主な給付制度</div>';
  html+='<table class="allowance-table">';
  html+='<tr><th>給付名</th><th>内容</th></tr>';
  html+='<tr><td>育児休業給付金</td><td>休業開始から6か月：賃金の67%／6か月以降：賃金の50%（雇用保険から支給）</td></tr>';
  html+='<tr><td>出生後休業支援給付金</td><td>産後パパ育休等を取得し一定要件を満たす場合、給付率を上乗せ（最大で実質10割相当）</td></tr>';
  html+='<tr><td>育児休業中の社会保険料免除</td><td>育児休業を取得した期間の健康保険・厚生年金保険料が免除される</td></tr>';
  html+='</table>';

  html+='<div class="sec-title" style="margin-top:1rem">📌 事業主の義務</div>';
  html+='<div style="font-size:12px;line-height:1.9;color:#333">';
  html+='・妊娠・出産等を申し出た従業員への<strong>個別の制度周知・取得意向確認</strong>（2022年4月〜）<br>';
  html+='・育児休業を取得しやすい雇用環境の整備（研修・相談窓口設置等）<br>';
  html+='・従業員数1,000人超の企業は<strong>男性育休等取得率の年1回公表</strong>（2023年4月〜）<br>';
  html+='・育児休業等を理由とする不利益取扱いの禁止';
  html+='</div>';

  html+='<div class="alert-ng" style="margin-top:.75rem">🔴 個別周知・意向確認を行わない場合や、ハラスメントを放置した場合は、都道府県労働局による行政指導・勧告の対象となります。</div>';
  html+='</div>';
  document.getElementById('rules-content').innerHTML=html;
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
renderEmployees();
</script>
</body>
</html>
