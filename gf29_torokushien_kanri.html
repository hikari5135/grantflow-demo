<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登録支援機関 支援業務管理システム｜GrantFlow デモ版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;background:#f0f2f5;min-height:100vh;padding:1.5rem 1rem;display:flex;justify-content:center}
.app{max-width:760px;width:100%}
.demo-banner{background:linear-gradient(135deg,#533AB7,#7C5DE0);border-radius:12px;padding:10px 16px;margin-bottom:1rem;color:#fff;text-align:center;font-size:11px}
.topbar{background:linear-gradient(135deg,#0F6E56,#1D9E75);border-radius:12px;padding:14px 16px;margin-bottom:1rem;color:#fff;text-align:center}
.topbar h1{font-size:15px;font-weight:700;margin-bottom:4px}
.topbar p{font-size:11px;opacity:.85;line-height:1.6}
.tabs{display:flex;gap:4px;margin-bottom:1rem;background:#fff;border-radius:10px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tab{flex:1;padding:8px 4px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;border-radius:7px;color:#666;border:none;background:none;font-family:inherit}
.tab.on{background:#1D9E75;color:#fff;font-weight:600}
.sec{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sec-title{font-size:14px;font-weight:700;color:#0F6E56;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid #E1F5EE}
.f{margin-bottom:.65rem}
.f label{font-size:11px;color:#666;display:block;margin-bottom:3px}
.f input,.f select,.f textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;outline:none;font-family:inherit}
.f input:focus,.f select:focus,.f textarea:focus{border-color:#1D9E75}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.badge-ok{background:#E1F5EE;color:#0F6E56}
.badge-warn{background:#FAEEDA;color:#854F0B}
.badge-ng{background:#FCEBEB;color:#A32D2D}
.badge-blue{background:#E6F1FB;color:#185FA5}
.badge-gray{background:#f0f0f0;color:#666}
.alert-box{border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:.75rem;line-height:1.7}
.alert-ok{background:#E1F5EE;border:1px solid #1D9E75;color:#0F6E56}
.alert-warn{background:#FAEEDA;border:1px solid #EF9F27;color:#854F0B}
.alert-ng{background:#FCEBEB;border:1px solid #E24B4A;color:#A32D2D}
.alert-blue{background:#E6F1FB;border:1px solid #185FA5;color:#0C447C}
.client-card{border:1.5px solid #eee;border-radius:12px;padding:1rem;margin-bottom:.75rem}
.client-header{display:flex;align-items:center;gap:8px;margin-bottom:.5rem;cursor:pointer}
.client-detail{display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px solid #eee}
.client-detail.open{display:block}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.check-item:last-child{border-bottom:none}
.chk{width:18px;height:18px;border-radius:4px;border:1.5px solid #ddd;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;margin-top:1px}
.chk.done{background:#1D9E75;border-color:#1D9E75}
.chk-title{flex:1;color:#333}
.chk-title.done{color:#1D9E75;text-decoration:line-through}
.add-btn{width:100%;padding:10px;border:2px dashed #1D9E75;border-radius:10px;background:none;color:#1D9E75;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:1rem;font-family:inherit}
.del-btn{padding:3px 8px;border:1px solid #E24B4A;border-radius:5px;background:#fff;color:#A32D2D;font-size:11px;cursor:pointer;font-family:inherit}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.summary-card{text-align:center;padding:10px 6px;border-radius:10px;border:1px solid #eee}
.summary-num{font-size:20px;font-weight:700}
.summary-label{font-size:10px;color:#666;margin-top:2px}
.progress-bar-bg{height:8px;background:#eee;border-radius:4px;margin-top:4px}
.progress-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.cta-box{background:linear-gradient(135deg,#0F6E56,#0A3D2B);border-radius:12px;padding:1.25rem;text-align:center;color:#fff;margin-top:1rem}
.cta-box h3{font-size:14px;font-weight:700;margin-bottom:6px}
.cta-box p{font-size:11px;opacity:.9;margin-bottom:10px;line-height:1.7}
.cta-btn{display:inline-block;background:#ffd700;color:#0A3D2B;font-weight:700;font-size:13px;padding:10px 24px;border-radius:8px;text-decoration:none}
</style>
</head>
<body>
<div class="app">
<div class="demo-banner">
  🎯 GrantFlow 登録支援機関 支援業務管理システム｜無料デモ版　ログイン不要
</div>
<div class="topbar">
  <h1>📂 登録支援機関 支援業務管理システム</h1>
  <p>受入れ機関ごとに支援10項目の実施状況を一元管理<br>定期面談・行政機関への報告漏れを防止</p>
</div>

<div class="tabs">
  <button class="tab on" onclick="switchTab('clients',this)">🏢 受入れ機関別管理</button>
  <button class="tab" onclick="switchTab('checklist',this)">📋 支援10項目</button>
  <button class="tab" onclick="switchTab('summary',this)">📊 全体サマリー</button>
</div>

<div id="tab-clients"><div id="clients-content"></div></div>
<div id="tab-checklist" style="display:none"><div id="checklist-content"></div></div>
<div id="tab-summary" style="display:none"><div id="summary-content"></div></div>

<div class="cta-box">
  <h3>🌿 GrantFlow 本番版でさらに便利に</h3>
  <p>本番版ではクラウド保存・支援実施報告書の自動生成・<br>地方出入国在留管理局への定期届出の期限管理ができます。<br>14日間無料トライアル実施中！</p>
  <a href="https://forms.gle/xrgH2CtGaCL7LXHE6" target="_blank" class="cta-btn">📝 無料トライアルを申し込む</a>
  <div style="font-size:11px;opacity:.75;margin-top:6px">akira.sakamoto5135@gmail.com</div>
</div>
</div>

<script>
var clients = [];
var expanded = {};

var SUPPORT_ITEMS = [
  {id:'s1', title:'事前ガイダンスの提供'},
  {id:'s2', title:'出入国する際の送迎'},
  {id:'s3', title:'住居確保・生活に必要な契約支援'},
  {id:'s4', title:'生活オリエンテーションの実施（8時間以上）'},
  {id:'s5', title:'公的手続き等への同行'},
  {id:'s6', title:'日本語学習の機会の提供'},
  {id:'s7', title:'相談・苦情への対応'},
  {id:'s8', title:'日本人との交流促進'},
  {id:'s9', title:'転職支援（人員整理等の場合）'},
  {id:'s10', title:'定期的な面談・行政機関への通報'}
];

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  ['clients','checklist','summary'].forEach(function(t){
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
  });
  if(tab==='clients') renderClients();
  if(tab==='checklist') renderChecklist();
  if(tab==='summary') renderSummary();
}

function addClient(){
  clients.push({name:'',workerCount:1,lastInterview:'',nextReport:'',checks:{},memo:''});
  renderClients();
}
function delClient(i){if(!confirm('削除しますか？'))return;clients.splice(i,1);renderClients();}
function upClient(i,key,val){clients[i][key]=val;renderClients();}
function toggleExpand(i){expanded[i]=!expanded[i];renderClients();}
function toggleClientCheck(i,id){
  if(!clients[i].checks) clients[i].checks={};
  clients[i].checks[id]=!clients[i].checks[id];
  renderClients();
}

function getCompletionRate(c){
  var done=SUPPORT_ITEMS.filter(function(item){return c.checks&&c.checks[item.id];}).length;
  return Math.round(done/SUPPORT_ITEMS.length*100);
}

function daysUntil(dateStr){
  if(!dateStr) return null;
  try{var d=new Date(dateStr);return Math.ceil((d-new Date())/86400000);}catch(e){return null;}
}

function renderClients(){
  var html='';
  if(clients.length===0){
    html='<div class="sec"><div style="text-align:center;padding:2rem;color:#aaa;font-size:13px">受入れ機関がまだ登録されていません。<br>下の「追加」ボタンから登録してください。</div></div>';
  } else {
    clients.forEach(function(c,i){
      var isExp=expanded[i];
      var pct=getCompletionRate(c);
      var days=daysUntil(c.nextReport);
      html+='<div class="client-card">';
      html+='<div class="client-header" onclick="toggleExpand('+i+')">';
      html+='<div style="flex:1">';
      html+='<div style="font-size:13px;font-weight:700">'+(c.name||'（受入れ機関名未入力）')+'</div>';
      html+='<div style="font-size:11px;color:#888">対象者'+c.workerCount+'名　支援実施率：'+pct+'%</div>';
      html+='</div>';
      if(days!==null&&days<=30) html+='<span class="badge badge-warn">報告期限まで'+(days<0?'超過':days+'日')+'</span>';
      html+='<span style="font-size:12px;color:#aaa;margin-left:4px">'+(isExp?'▲':'▼')+'</span>';
      html+='</div>';
      html+='<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%;background:'+(pct===100?'#1D9E75':pct>50?'#185FA5':'#EF9F27')+'"></div></div>';
      html+='<div class="client-detail'+(isExp?' open':'')+'">';
      html+='<div class="r3">';
      html+='<div class="f" style="grid-column:1/-1"><label>受入れ機関名</label><input type="text" value="'+escH(c.name)+'" placeholder="例：株式会社〇〇" oninput="upClient('+i+',\'name\',this.value)"></div>';
      html+='<div class="f"><label>対象者数</label><input type="number" value="'+c.workerCount+'" min="1" oninput="upClient('+i+',\'workerCount\',this.value)"></div>';
      html+='<div class="f"><label>最終面談日</label><input type="date" value="'+escH(c.lastInterview)+'" oninput="upClient('+i+',\'lastInterview\',this.value)"></div>';
      html+='<div class="f"><label>次回定期届出期限</label><input type="date" value="'+escH(c.nextReport)+'" oninput="upClient('+i+',\'nextReport\',this.value)"></div>';
      html+='</div>';
      html+='<div class="f"><label>メモ</label><input type="text" value="'+escH(c.memo)+'" placeholder="備考など" oninput="upClient('+i+',\'memo\',this.value)"></div>';
      html+='<div style="font-size:12px;font-weight:600;color:#0F6E56;margin:.75rem 0 4px">支援10項目チェック</div>';
      SUPPORT_ITEMS.forEach(function(item,idx){
        var d=c.checks&&c.checks[item.id];
        html+='<div class="check-item"><div class="chk'+(d?' done':'')+'" onclick="toggleClientCheck('+i+',\''+item.id+'\')">'+(d?'✓':'')+'</div><div class="chk-title'+(d?' done':'')+'">'+(idx+1)+'. '+item.title+'</div></div>';
      });
      html+='<button class="del-btn" style="margin-top:.5rem" onclick="delClient('+i+')">🗑 削除</button>';
      html+='</div></div>';
    });
  }
  html+='<button class="add-btn" onclick="addClient()">＋ 受入れ機関を追加</button>';
  document.getElementById('clients-content').innerHTML=html;
}

function renderChecklist(){
  var html='<div class="sec"><div class="sec-title">📋 1号特定技能外国人支援 10項目</div>';
  html+='<div class="alert-blue">登録支援機関が実施すべき支援10項目です。受入れ機関別管理タブで、各機関の実施状況をチェックできます。</div>';
  SUPPORT_ITEMS.forEach(function(item,idx){
    html+='<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px"><strong>'+(idx+1)+'.</strong> '+item.title+'</div>';
  });
  html+='<div class="alert-warn" style="margin-top:.75rem">🟡 支援責任者・支援担当者は3か月に1回以上、対象者および監督者と面談を実施する必要があります。</div>';
  html+='</div>';
  document.getElementById('checklist-content').innerHTML=html;
}

function renderSummary(){
  var html='<div class="sec"><div class="sec-title">📊 全体サマリー</div>';
  if(clients.length===0){
    html+='<div style="text-align:center;color:#aaa;font-size:12px;padding:1rem">受入れ機関別管理タブで登録するとサマリーが表示されます</div>';
  } else {
    var totalClients=clients.length;
    var totalWorkers=clients.reduce(function(a,c){return a+(parseInt(c.workerCount)||0);},0);
    var avgRate=Math.round(clients.reduce(function(a,c){return a+getCompletionRate(c);},0)/totalClients);
    var urgentReports=clients.filter(function(c){var d=daysUntil(c.nextReport);return d!==null&&d<=30;}).length;

    html+='<div class="summary-grid">';
    html+='<div class="summary-card"><div class="summary-num" style="color:#0F6E56">'+totalClients+'</div><div class="summary-label">受入れ機関数</div></div>';
    html+='<div class="summary-card"><div class="summary-num" style="color:#185FA5">'+totalWorkers+'</div><div class="summary-label">対象者総数</div></div>';
    html+='<div class="summary-card"><div class="summary-num" style="color:#854F0B">'+avgRate+'%</div><div class="summary-label">平均実施率</div></div>';
    html+='<div class="summary-card" style="background:#FCEBEB;border-color:#E24B4A"><div class="summary-num" style="color:#A32D2D">'+urgentReports+'</div><div class="summary-label">報告期限間近</div></div>';
    html+='</div>';

    html+='<div style="font-size:12px;font-weight:600;color:#333;margin-bottom:8px">受入れ機関別 実施率</div>';
    clients.forEach(function(c){
      var pct=getCompletionRate(c);
      html+='<div style="margin-bottom:.5rem">';
      html+='<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px"><span>'+escH(c.name||'（未入力）')+'</span><span style="font-weight:600">'+pct+'%</span></div>';
      html+='<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%;background:'+(pct===100?'#1D9E75':pct>50?'#185FA5':'#EF9F27')+'"></div></div>';
      html+='</div>';
    });
  }
  html+='</div>';
  document.getElementById('summary-content').innerHTML=html;
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
renderClients();
</script>
</body>
</html>
